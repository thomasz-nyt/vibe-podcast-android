name: Bug report
description: Something is broken in BunPod
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in as much as you can — the more detail, the faster it gets fixed.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered list of steps that reliably trigger the bug.
      placeholder: |
        1. Open the app
        2. Tap ...
        3. ...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device (make/model)
      placeholder: e.g. Pixel 7
    validations:
      required: true

  - type: input
    id: android_version
    attributes:
      label: Android version / API level
      placeholder: e.g. Android 14 (API 34)
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version or commit SHA
      placeholder: e.g. 1.0.0 or ffd5e60

  - type: textarea
    id: logs
    attributes:
      label: Relevant logcat / stack trace
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag and drop images or video here.
